       <style>

html, body {
    width:100%;
    height:100%;
    padding:0;
    margin:0;
    overflow:hidden;
    font-family:'Segoe UI', Arial, sans-serif;
}


#map {
    position:absolute;
    top:120px;

    width:100%;
}


/* ===== HEADER ===== */

.header {

    position:absolute;
    top:0;

/* DENR LOGO */

/* TITLE */

/* ===== LEAFLET DESIGN ===== */

}


.leaflet-popup-content table {

    border-collapse:collapse;

    padding-right:10px;

/* LAYER PANEL */

.leaflet-control-layers {

    font-size:14px;

/* MOBILE */

#map {

top:90px;

}

height:90px;

}

left:10px;

}

height:55px;

</style>
       <title>
Relief Assistance Distribution Monitoring Map
</title>
    </head>
   <body>


<div class="header">


    <div class="logo">

        <img src="images/denr_logo.png">

    </div>


    <div class="title">


        <h1>
        Relief Assistance Distribution Monitoring Map
        </h1>


        <p>

        </p>

</div>




<div id="map">
</div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/L.Control.Locate.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="js/leaflet-measure.js"></script>
        <script src="data/mun_1.js"></script>
        <script src="data/Quantitydistributed_2.js"></script>
        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[5.531567113586822,124.48930252491925],[6.315611882221345,125.53114242746422]]);
        var hash = new L.Hash(map);
      map.attributionControl.setPrefix(
'© DENR XII | Relief Assistance Distribution Monitoring System'
);
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        L.control.locate({locateOptions: {maxZoom: 19}}).addTo(map);
        var measureControl = new L.Control.Measure({
            position: 'topleft',
            primaryLengthUnit: 'meters',
            secondaryLengthUnit: 'kilometers',
            primaryAreaUnit: 'sqmeters',
            secondaryAreaUnit: 'hectares'
        });
        measureControl.addTo(map);
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].innerHTML = '';
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].className += ' fas fa-ruler';
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_GoogleSatellite_0');
        map.getPane('pane_GoogleSatellite_0').style.zIndex = 400;
        var layer_GoogleSatellite_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleSatellite_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
        });
        layer_GoogleSatellite_0;
        map.addLayer(layer_GoogleSatellite_0);
        function pop_mun_1(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">LGU</th>\
                        <td class="visible-with-data" id="ADM3_EN">' + (feature.properties['ADM3_EN'] !== null ? autolinker.link(String(feature.properties['ADM3_EN']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Description</th>\
                        <td class="visible-with-data" id="Descriptio">' + (feature.properties['Descriptio'] !== null ? autolinker.link(String(feature.properties['Descriptio']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Quantity</th>\
                        <td class="visible-with-data" id="Quantity">' + (feature.properties['Quantity'] !== null ? autolinker.link(String(feature.properties['Quantity']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Date of Distribution</th>\
                        <td class="visible-with-data" id="Date_1">' + (feature.properties['Date_1'] !== null ? autolinker.link(String(feature.properties['Date_1']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_mun_1_0(feature) {
            switch(String(feature.properties['Quantity'])) {
                case '0':
                    return {
                pane: 'pane_mun_1',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(247,251,255,1.0)',
                interactive: true,
            }
                    break;
                case '25':
                    return {
                pane: 'pane_mun_1',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(115,178,216,1.0)',
                interactive: true,
            }
                    break;
                default:
                    return {
                pane: 'pane_mun_1',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(8,48,107,1.0)',
                interactive: true,
            }
                    break;
            }
        }
        map.createPane('pane_mun_1');
        map.getPane('pane_mun_1').style.zIndex = 401;
        map.getPane('pane_mun_1').style['mix-blend-mode'] = 'normal';
        var layer_mun_1 = new L.geoJson(json_mun_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_mun_1',
            layerName: 'layer_mun_1',
            pane: 'pane_mun_1',
            onEachFeature: pop_mun_1,
            style: style_mun_1_0,
        });
        bounds_group.addLayer(layer_mun_1);
        map.addLayer(layer_mun_1);
        function pop_Quantitydistributed_2(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">Barangay</th>\
                        <td>' + (feature.properties['ADM4_EN'] !== null ? autolinker.link(String(feature.properties['ADM4_EN']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">LGU</th>\
                        <td class="visible-with-data" id="ADM3_EN">' + (feature.properties['ADM3_EN'] !== null ? autolinker.link(String(feature.properties['ADM3_EN']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Description</th>\
                        <td class="visible-with-data" id="Descriptio">' + (feature.properties['Descriptio'] !== null ? autolinker.link(String(feature.properties['Descriptio']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Quanity</th>\
                        <td class="visible-with-data" id="Quanity">' + (feature.properties['Quanity'] !== null ? autolinker.link(String(feature.properties['Quanity']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Date of Distribution</th>\
                        <td class="visible-with-data" id="Date">' + (feature.properties['Date'] !== null ? autolinker.link(String(feature.properties['Date']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_Quantitydistributed_2_0(feature) {
            switch(String(feature.properties['Quanity'])) {
                case '0':
                    return {
                pane: 'pane_Quantitydistributed_2',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(247,251,255,1.0)',
                interactive: true,
            }
                    break;
                case '33':
                    return {
                pane: 'pane_Quantitydistributed_2',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(209,226,243,1.0)',
                interactive: true,
            }
                    break;
                case '50':
                    return {
                pane: 'pane_Quantitydistributed_2',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(154,200,224,1.0)',
                interactive: true,
            }
                    break;
                case '55':
                    return {
                pane: 'pane_Quantitydistributed_2',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(82,157,204,1.0)',
                interactive: true,
            }
                    break;
                case '88':
                    return {
                pane: 'pane_Quantitydistributed_2',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(29,108,177,1.0)',
                interactive: true,
            }
                    break;
                default:
                    return {
                pane: 'pane_Quantitydistributed_2',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(8,48,107,1.0)',
                interactive: true,
            }
                    break;
            }
        }
        map.createPane('pane_Quantitydistributed_2');
        map.getPane('pane_Quantitydistributed_2').style.zIndex = 402;
        map.getPane('pane_Quantitydistributed_2').style['mix-blend-mode'] = 'normal';
        var layer_Quantitydistributed_2 = new L.geoJson(json_Quantitydistributed_2, {
            attribution: '',
            interactive: true,
            dataVar: 'json_Quantitydistributed_2',
            layerName: 'layer_Quantitydistributed_2',
            pane: 'pane_Quantitydistributed_2',
            onEachFeature: pop_Quantitydistributed_2,
            style: style_Quantitydistributed_2_0,
        });
        bounds_group.addLayer(layer_Quantitydistributed_2);
        map.addLayer(layer_Quantitydistributed_2);
        var overlaysTree = [
            {label: 'Quantity distributed<br /><table><tr><td style="text-align: center;"><img src="legend/Quantitydistributed_2_00.png" /></td><td>0</td></tr><tr><td style="text-align: center;"><img src="legend/Quantitydistributed_2_331.png" /></td><td>33</td></tr><tr><td style="text-align: center;"><img src="legend/Quantitydistributed_2_502.png" /></td><td>50</td></tr><tr><td style="text-align: center;"><img src="legend/Quantitydistributed_2_553.png" /></td><td>55</td></tr><tr><td style="text-align: center;"><img src="legend/Quantitydistributed_2_884.png" /></td><td>88</td></tr><tr><td style="text-align: center;"><img src="legend/Quantitydistributed_2_5.png" /></td><td></td></tr></table>', layer: layer_Quantitydistributed_2},
            {label: 'mun<br /><table><tr><td style="text-align: center;"><img src="legend/mun_1_00.png" /></td><td>0</td></tr><tr><td style="text-align: center;"><img src="legend/mun_1_251.png" /></td><td>25</td></tr><tr><td style="text-align: center;"><img src="legend/mun_1_2.png" /></td><td></td></tr></table>', layer: layer_mun_1},
            {label: "Google Satellite", layer: layer_GoogleSatellite_0, radioGroup: 'bm' },]
        var lay = L.control.layers.tree(null, overlaysTree,{
            //namedToggle: true,
            //selectorBack: false,
            //closedSymbol: '&#8862; &#x1f5c0;',
            //openedSymbol: '&#8863; &#x1f5c1;',
            //collapseAll: 'Collapse all',
            //expandAll: 'Expand all',
            collapsed: true,
        });
        lay.addTo(map);
        setBounds();
        var i = 0;
        layer_Quantitydistributed_2.eachLayer(function(layer) {
            var context = {
                feature: layer.feature,
                variables: {}
            };
            layer.bindTooltip((layer.feature.properties['ADM4_EN'] !== null?String('<div style="color: #323232; font-size: 10pt; font-family: \'Open Sans\', sans-serif;">' + layer.feature.properties['ADM4_EN']) + '</div>':''), {permanent: true, offset: [-0, -16], className: 'css_Quantitydistributed_2'});
            labels.push(layer);
            totalMarkers += 1;
              layer.added = true;
              addLabel(layer, i);
              i++;
        });
        resetLabels([layer_Quantitydistributed_2]);
        map.on("zoomend", function(){
            resetLabels([layer_Quantitydistributed_2]);
        });
        map.on("layeradd", function(){
            resetLabels([layer_Quantitydistributed_2]);
        });
        map.on("layerremove", function(){
            resetLabels([layer_Quantitydistributed_2]);
        });
        </script>        
    </body>
